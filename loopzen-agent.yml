# ═══════════════════════════════════════════════════════════════
#  Loopzen — K8s Watcher Agent
#
#  Deploy this into each cluster you want to monitor.
#  Steps:
#    1. Replace YOUR_LOOPZEN_REDIS_HOST with your Loopzen server IP
#    2. Replace YOUR_CLUSTER_UUID with the UUID from Dashboard → Clusters → Add
#    3. Replace YOUR_CLUSTER_NAME with a friendly name
#    4. kubectl apply -f loopzen-agent.yml
# ═══════════════════════════════════════════════════════════════

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: loopzen-agent
  namespace: kube-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: loopzen-agent
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: loopzen-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: loopzen-agent
subjects:
  - kind: ServiceAccount
    name: loopzen-agent
    namespace: kube-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loopzen-agent
  namespace: kube-system
  labels:
    app: loopzen-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loopzen-agent
  template:
    metadata:
      labels:
        app: loopzen-agent
    spec:
      serviceAccountName: loopzen-agent
      containers:
        - name: agent
          image: ghcr.io/Akshatsainiaks/loopzen-agent:latest
          imagePullPolicy: Always
          env:
            - name: REDIS_URL
              value: "redis://YOUR_LOOPZEN_REDIS_HOST:6379"
            - name: CLUSTER_ID
              value: "YOUR_CLUSTER_UUID"
            - name: CLUSTER_NAME
              value: "YOUR_CLUSTER_NAME"
            - name: WATCH_NAMESPACES
              value: ""   # empty = watch all namespaces
          resources:
            requests:
              cpu:    5m
              memory: 16Mi
            limits:
              cpu:    50m
              memory: 64Mi
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      restartPolicy: Always