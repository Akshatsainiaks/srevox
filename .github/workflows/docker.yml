name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: |
            ghcr.io/akshatsainiaks/srevox-api:latest
            ghcr.io/akshatsainiaks/srevox-api:${{ steps.version.outputs.tag }}
            akshatsaini08/srevox-api:latest
            akshatsaini08/srevox-api:${{ steps.version.outputs.tag }}

      - name: Build & Push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./apps/alert-worker
          push: true
          tags: |
            ghcr.io/akshatsainiaks/srevox-worker:latest
            ghcr.io/akshatsainiaks/srevox-worker:${{ steps.version.outputs.tag }}
            akshatsaini08/srevox-worker:latest
            akshatsaini08/srevox-worker:${{ steps.version.outputs.tag }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          tags: |
            ghcr.io/akshatsainiaks/srevox-frontend:latest
            ghcr.io/akshatsainiaks/srevox-frontend:${{ steps.version.outputs.tag }}
            akshatsaini08/srevox-frontend:latest
            akshatsaini08/srevox-frontend:${{ steps.version.outputs.tag }}

      - name: Build & Push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          tags: |
            ghcr.io/akshatsainiaks/srevox-ai:latest
            ghcr.io/akshatsainiaks/srevox-ai:${{ steps.version.outputs.tag }}
            akshatsaini08/srevox-ai:latest
            akshatsaini08/srevox-ai:${{ steps.version.outputs.tag }}

      - name: Build & Push Agent
        uses: docker/build-push-action@v5
        with:
          context: ./apps/watcher
          push: true
          tags: |
            ghcr.io/akshatsainiaks/srevox-agent:latest
            ghcr.io/akshatsainiaks/srevox-agent:${{ steps.version.outputs.tag }}
            akshatsaini08/srevox-agent:latest
            akshatsaini08/srevox-agent:${{ steps.version.outputs.tag }}
